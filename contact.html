<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ubuntu GeoScience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Same navbar as index.html -->
    <header class="navbar">...</header>

    <!-- Contact Section with centered layout -->
    <section id="contact" class="section">
        <div class="contact-container">
            <!-- Logo centered -->
            <div class="contact-logo">
                <img src="images/logo_portrait.png" alt="Ubuntu GeoScience Logo" class="logo_portrait_contact">
            </div>

            <!-- Email and Telephone (centered, below logo) -->
            <div class="contact-details-center">
                <div class="contact-item">
                    <h3>Direct Inquiries</h3>
                    <p><i class="fa-solid fa-envelope"></i> <a href="mailto:info@ubuntugeoscience.com">info@ubuntugeoscience.com</a></p>
                </div>
                <div class="contact-item">
                    <h3>Telephone</h3>
                    <p><i class="fa-solid fa-phone"></i> <a href="tel:+966535567001">+966 535 567 001</a></p>
                </div>
            </div>

            <!-- Small centered footer text -->
            <div class="contact-footer-text">
                Ubuntu Geoscience‑2026
            </div>
        </div>
    </section>

    <!-- Footer (same as index) -->
    <footer>...</footer>

    <script src="script.js"></script>
</body>
</html>
