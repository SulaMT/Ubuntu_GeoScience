<body>

    {% include nav.html %}

    <div id="main-ui" style="display: flex; flex-direction: column; min-height: 100vh;">
        {% include header.html %}
        <main class="container">
            {% include home_content.html %}
        </main>
        <footer>© 2026 Ubuntu GeoScience</footer>
    </div>

    <div id="about-screen">
        <main class="container">
            {% include about_section.html %}
        </main>
    </div>

    <div id="services-screen">
        {% include services_section.html %}
    </div>

    <div id="contact-screen">
        {% include contact_section.html %}
    </div>

    <script>
        function closeMenu() { 
            document.getElementById('menu-toggle').checked = false; 
        }
        function hideAll() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('services-screen').style.display = 'none';
            document.getElementById('contact-screen').style.display = 'none';
            document.getElementById('about-screen').style.display = 'none';
        }
        function showHome() { 
            hideAll(); 
            document.getElementById('main-ui').style.display = 'flex'; 
            closeMenu(); 
        }
        function showAbout() { 
            hideAll(); 
            document.getElementById('about-screen').style.display = 'flex'; 
            closeMenu(); 
        }
        function showServices() { 
            hideAll(); 
            document.getElementById('services-screen').style.display = 'flex'; 
            closeMenu(); 
        }
        function showContact() { 
            hideAll(); 
            document.getElementById('contact-screen').style.display = 'flex'; 
            closeMenu(); 
        }
    </script>
</body>
